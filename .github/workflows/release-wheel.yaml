name: Release wheels

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 1.2.3)
        required: true
        type: string

jobs:
  release-wheel:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Build wheel
        run: make wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  publish-release:
    runs-on: ubuntu-latest
    needs: release-wheel
    permissions:
      contents: write
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Normalize release version
        id: normalize
        run: |
          version="${{ inputs.version }}"
          echo "release_tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Rename wheel to stable filename
        run: mv dist/*.whl dist/uploader-latest-py3-none-any.whl

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.normalize.outputs.release_tag }}
          name: Release ${{ steps.normalize.outputs.release_tag }}
          generate_release_notes: true
          files: dist/uploader-latest-py3-none-any.whl
